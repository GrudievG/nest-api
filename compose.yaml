services:
  api:
    build:
      context: .
      target: prod
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-rd-nest-api}
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_CLOUDFRONT_URL=${AWS_CLOUDFRONT_URL}
      - FILES_PRESIGN_EXPIRES_IN_SEC=${FILES_PRESIGN_EXPIRES_IN_SEC}
    command: npm run start:prod
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:3000"
    networks:
      - internal
      - public


  postgres:
    image: postgres:16-alpine
    container_name: rd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-rd-nest-api}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5


  minio:
    image: minio/minio:latest
    container_name: rd-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - internal
    ports:
      - "9001:9001" # console only

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY} &&
      mc mb --ignore-existing local/${AWS_S3_BUCKET} &&
      mc anonymous set none local/${AWS_S3_BUCKET};
      echo 'MinIO bucket is ready';
      "
    networks:
      - internal
    profiles: [ "tools" ]

  migrate:
    build:
      context: .
      target: prod
    command: [ "npm", "run", "db:migrate:prod" ]
    environment:
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-rd-nest-api}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    profiles: [ "tools" ]

  seed:
    build:
      context: .
      target: prod
    command: [ "npm", "run", "db:seed:prod" ]
    environment:
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-rd-nest-api}
    depends_on:
      - migrate
    networks:
      - internal
    profiles: [ "tools" ]

volumes:
  db-data:
  minio-data:

networks:
  internal:
    internal: true
  public:


