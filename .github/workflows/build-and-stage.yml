name: Build and Deploy to Stage
on:
  workflow_dispatch:
  push:
    branches:
      - develop

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set metadata
        id: meta
        run: |
          TAG=sha-${GITHUB_SHA::7}
          IMAGE=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:$TAG
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build -t ${{ steps.meta.outputs.image }} .

      - name: Push image
        run: |
          docker push ${{ steps.meta.outputs.image }}

      - name: Save release manifest
        run: |
          cat <<EOF > release-manifest.json
          {
            "commit": "${GITHUB_SHA::7}",
            "services": {
              "api": {
                "image": "${{ steps.meta.outputs.image }}"
              }
            }
          }
          EOF

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-manifest.json

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: stage

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGE_HOST }}
          username: ${{ secrets.STAGE_USER }}
          key: ${{ secrets.STAGE_SSH_KEY }}
          script: |
            set -e

            IMAGE=${{ needs.build.outputs.image }}

            echo "Deploying image: $IMAGE"

            # Login to ECR from EC2
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin $(echo $IMAGE | cut -d'/' -f1)

            docker pull $IMAGE

            cd ~/app
            
            export ECR_IMAGE=$IMAGE

            export DB_USER='${{ secrets.DB_USER }}'
            export DB_PASSWORD='${{ secrets.DB_PASSWORD }}'
            export DB_NAME='${{ secrets.DB_NAME }}'
  
            export JWT_SECRET='${{ secrets.JWT_SECRET }}'
            export JWT_EXPIRES_IN='${{ secrets.JWT_EXPIRES_IN }}'
  
            export AWS_REGION='${{ secrets.AWS_REGION }}'
            export AWS_S3_BUCKET='${{ secrets.AWS_S3_BUCKET }}'
            export AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}'
            export AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}'
  
            echo "Stopping old containers"
            docker-compose down
  
            echo "Pulling latest images"
            docker-compose pull
  
            echo "Starting infrastructure (db, mq)"
            docker-compose -f docker-compose.stage.yml up -d
  
            echo "Running migrations"
            docker-compose run --rm migrate
  
            echo "Running seed"
            docker-compose run --rm seed

      - name: Smoke test
        run: |
          curl -f https://${{ secrets.STAGE_HOST }}:3000
